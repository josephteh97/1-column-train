<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>column-review</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <!-- Reviewer-id bar: shown only on first launch (no ~/.column-review.json).
       Non-modal, inline at the top — never blocks marking flow. -->
  <div id="reviewer-id-bar" class="hidden">
    <label>Reviewer id: <input id="reviewer-id-input" type="text" autocomplete="off" placeholder="alice"></label>
    <button id="reviewer-id-save">Set</button>
    <span class="hint">Saved to ~/.column-review.json; future sessions reuse it.</span>
  </div>

  <!-- Top progress strip. Always visible. -->
  <header id="progress-strip">
    <span class="drawing-id" id="drawing-id-label">—</span>
    <span class="counter unreviewed"><b id="cnt-unreviewed">0</b> unreviewed</span>
    <span class="counter tp"><b id="cnt-tp">0</b> TP</span>
    <span class="counter fp"><b id="cnt-fp">0</b> FP</span>
    <span class="counter fn"><b id="cnt-fn">0</b> FN_ADDED</span>
    <span class="filter-group">
      filter:
      <button data-filter="ALL" class="filter-btn active">all</button>
      <button data-filter="UNREVIEWED" class="filter-btn">unrev</button>
      <button data-filter="TP" class="filter-btn">TP</button>
      <button data-filter="FP" class="filter-btn">FP</button>
      <button data-filter="FN_ADDED" class="filter-btn">FN</button>
    </span>
    <span class="zoom-group">
      zoom: <input id="zoom-input" type="text" value="100" size="4">%
    </span>
    <button id="infer-btn" class="hidden" title="Run column_detect.pt on this drawing and populate the overlay">
      <span class="label">Run inference</span>
      <span class="spinner hidden"></span>
    </button>
    <span class="hint">T·F·D · A=add · U/Y=undo/redo · N/P=next/prev · 0=100% · F=fit · Space=pan · Shift+drag=select</span>
  </header>

  <!-- Full-screen perf-fail / dzi-missing banner. Replaces viewer when shown. -->
  <div id="fail-banner" class="hidden">
    <div class="fail-panel">
      <h1>Cannot run reviewer</h1>
      <pre id="fail-message"></pre>
    </div>
  </div>

  <!-- Main viewport. OSD instantiates inside #viewer. The overlay canvas
       sits on top and is repainted every viewport-update event. -->
  <main id="viewer-wrap">
    <div id="viewer"></div>
    <canvas id="overlay-canvas"></canvas>
    <div id="minimap-wrap">
      <canvas id="minimap-canvas"></canvas>
    </div>
  </main>

  <script src="/static/vendor/openseadragon.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
